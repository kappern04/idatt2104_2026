name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-targets

  test-analytics:
    name: test analytics (nextest + Codecov)
    runs-on: ubuntu-latest
    # Always run for the report, even if `test` already failed somewhere.
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: nextest

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests with nextest (JUnit output)
        # `--no-fail-fast` so a failing test still produces a complete report.
        # Don't fail the job here — Codecov needs the XML even on red builds.
        run: cargo nextest run --workspace --profile ci --no-fail-fast || true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml

      - name: Upload JUnit artefact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: target/nextest/ci/junit.xml

  coverage:
    name: coverage (grcov)
    needs: test
    runs-on: ubuntu-latest
    # Source-based coverage requires fresh, non-incremental builds.
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-Cinstrument-coverage"
      LLVM_PROFILE_FILE: "rustcrdt-%p-%m.profraw"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with llvm-tools-preview
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install grcov
        run: cargo install grcov --locked

      - name: Run tests with coverage instrumentation
        run: cargo test --workspace

      - name: Aggregate coverage with grcov
        run: |
          mkdir -p coverage/html

          grcov . \
            --binary-path ./target/debug/deps/ \
            --source-dir . \
            --output-type lcov \
            --branch \
            --ignore-not-existing \
            --ignore 'target/*' \
            --ignore '/*' \
            --output-path coverage/lcov.info

          grcov . \
            --binary-path ./target/debug/deps/ \
            --source-dir . \
            --output-type html \
            --branch \
            --ignore-not-existing \
            --ignore 'target/*' \
            --ignore '/*' \
            --output-path coverage/html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: rust
          fail_ci_if_error: false

      - name: Upload coverage artefacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

