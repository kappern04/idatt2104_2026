name: CI

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-targets

  coverage:
    name: coverage (grcov)
    needs: test
    runs-on: ubuntu-latest
    # Source-based coverage requires fresh, non-incremental builds.
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-Cinstrument-coverage"
      LLVM_PROFILE_FILE: "rustcrdt-%p-%m.profraw"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with llvm-tools-preview
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install grcov
        run: cargo install grcov --locked

      - name: Run tests with coverage instrumentation
        run: cargo test --workspace

      - name: Aggregate coverage with grcov
        run: |
          grcov . \
            --binary-path ./target/debug/deps/ \
            --source-dir . \
            --output-types lcov,html \
            --branch \
            --ignore-not-existing \
            --ignore 'target/*' \
            --ignore '/*' \
            --output-path coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov
          flags: rust
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artefacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

